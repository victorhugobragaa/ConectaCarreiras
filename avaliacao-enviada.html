<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conecta Carreiras | Avaliação Enviada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="menu.css" />
    <style>
      :root {
        --bg: #071425;
        --surface: #101b2c;
        --border: rgba(255, 255, 255, 0.52);
        --muted: rgba(255, 255, 255, 0.84);
        --red: #d11217;
        --gradient: linear-gradient(100.5deg, #00346f 25.34%, #da0015 97.29%);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: #fff;
        font-family: "Inter", Arial, sans-serif;
      }

      body::before {
        position: fixed;
        left: -260px;
        top: -260px;
        z-index: 1;
        width: clamp(620px, 48vw, 860px);
        height: clamp(680px, 82vh, 960px);
        pointer-events: none;
        background:
          radial-gradient(ellipse at 0% 0%, rgba(0, 119, 255, 0.34) 0%, rgba(0, 88, 190, 0.2) 34%, rgba(0, 52, 111, 0.08) 58%, transparent 76%),
          linear-gradient(135deg, rgba(0, 119, 255, 0.14) 0%, rgba(0, 52, 111, 0.08) 44%, transparent 72%);
        filter: blur(70px);
        content: "";
      }

      .sent-page {
        position: relative;
        z-index: 2;
        min-height: 100vh;
      }

      .sent-page .site-menu__item { position: relative; }
      .sent-page .site-menu__item.is-active { color: var(--red); }
      .sent-page .site-menu__item.is-active::after {
        position: absolute;
        left: 0;
        right: 0;
        bottom: -13px;
        height: 2px;
        background: rgba(255, 255, 255, 0.62);
        content: "";
      }

      .success-layout {
        width: min(1320px, calc(100% - 72px));
        min-height: calc(100vh - 70px);
        display: flex;
        align-items: center;
        margin: 0 auto;
      }

      .success-copy {
        width: 100%;
        max-width: 650px;
        padding-left: clamp(8px, 3vw, 64px);
      }

      .check-icon {
        display: grid;
        width: 48px;
        height: 48px;
        place-items: center;
        margin-bottom: 32px;
        border: 4px solid #fff;
        border-radius: 8px;
      }

      .check-icon::before {
        width: 24px;
        height: 12px;
        border-left: 4px solid #fff;
        border-bottom: 4px solid #fff;
        transform: rotate(-45deg) translate(2px, -2px);
        content: "";
      }

      h1 {
        max-width: 620px;
        margin: 0 0 24px;
        font-size: clamp(32px, 4vw, 52px);
        line-height: 1.18;
        font-weight: 900;
      }

      p {
        max-width: 600px;
        margin: 0 0 36px;
        color: var(--muted);
        font-size: clamp(16px, 1.25vw, 19px);
        line-height: 1.35;
        font-weight: 400;
      }

      p em {
        font-style: italic;
      }

      .home-button {
        display: inline-flex;
        width: min(420px, 100%);
        min-height: 60px;
        align-items: center;
        justify-content: center;
        border: 1.25px solid var(--border);
        border-radius: 10px;
        background: var(--gradient);
        color: #fff;
        font-size: clamp(20px, 2.2vw, 26px);
        font-weight: 900;
        text-decoration: none;
      }

      .success-art {
        position: absolute;
        bottom: 0;
        right: 0;
        z-index: -1;
      }

      .success-art img {
        display: block;
        width: min(550px, 45vw);
      }

      .site-footer {
        position: relative;
        z-index: 2;
        padding: 28px 20px;
        background: var(--surface);
        color: rgba(255, 255, 255, 0.55);
        text-align: center;
        font-size: 13px;
      }

      @media (max-width: 980px) {
        .success-layout {
          grid-template-columns: 1fr;
          padding-top: 44px;
        }

        .success-copy {
          padding-left: 0;
        }

        .check-icon {
          margin-bottom: 32px;
        }
      }
    </style>
  </head>
  <body>
    <main class="sent-page">
      <div id="site-menu" data-active="avaliacoes" data-auth="true"></div>
      <section class="success-layout">
        <div class="success-copy">
          <span class="check-icon" aria-hidden="true"></span>
          <h1>Sua avaliação foi enviada com sucesso</h1>
          <p>Agradecemos o envio. Em breve, nossa equipe analisará sua avaliação e você receberá um retorno dentro de três a cinco dias. Caso tenha dúvidas, <em>entre em contato com nosso suporte.</em></p>
          <a class="home-button" href="index.html">Voltar a Home</a>
        </div>
        <div class="success-art">
          <img src="IMAGENS/Avaliação_Enviada.png" alt="Pessoa visualizando avaliações enviadas" />
        </div>
      </section>
    </main>
    <footer class="site-footer">&copy; Conecta Carreiras 2026. Todos os Direitos Reservados.</footer>
    <script src="menu.js"></script>
  </body>
</html>
