<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conecta Carreiras | Candidatura Enviada</title>
    <link rel="icon" type="image/png" href="IMAGENS/Faicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="menu.css" />
    <style>
      :root {
        --bg: #081425;
        --surface: #101b2c;
        --panel: rgba(16, 27, 44, 0.82);
        --border: rgba(255, 255, 255, 0.62);
        --muted: rgba(255, 255, 255, 0.78);
        --red: #d11217;
        --gradient: linear-gradient(100.5deg, #00346f 25.34%, #da0015 97.29%);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: #fff;
        font-family: "Inter", Arial, sans-serif;
      }

      body::before {
        position: fixed;
        left: -260px;
        top: -260px;
        z-index: 1;
        width: clamp(620px, 48vw, 860px);
        height: clamp(680px, 82vh, 960px);
        pointer-events: none;
        background:
          radial-gradient(ellipse at 0% 0%, rgba(0, 119, 255, 0.34) 0%, rgba(0, 88, 190, 0.2) 34%, rgba(0, 52, 111, 0.08) 58%, transparent 76%),
          linear-gradient(135deg, rgba(0, 119, 255, 0.14) 0%, rgba(0, 52, 111, 0.08) 44%, transparent 72%);
        filter: blur(70px);
        content: "";
      }

      .confirmation-page {
        position: relative;
        z-index: 2;
        min-height: 100vh;
      }

      .confirmation-page .site-menu__item { position: relative; }
      .confirmation-page .site-menu__item.is-active { color: var(--red); }
      .confirmation-page .site-menu__item.is-active::after {
        position: absolute;
        left: 0;
        right: 0;
        bottom: -13px;
        height: 2px;
        background: rgba(255, 255, 255, 0.62);
        content: "";
      }

      .content {
        width: min(1180px, calc(100% - 72px));
        margin: 0 auto;
        padding: 76px 0 48px;
      }

      .progress-wrap {
        width: min(300px, 28vw);
        margin: 0 16px 66px auto;
      }

      .progress-label {
        margin: 0 0 10px;
        color: rgba(255, 255, 255, 0.82);
        text-align: right;
        font-size: 13px;
        font-weight: 500;
      }

      .progress {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.22);
      }

      .progress span {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: var(--gradient);
      }

      .success-card {
        display: grid;
        grid-template-columns: 170px 1fr;
        align-items: center;
        gap: 32px;
        min-height: 186px;
        padding: 24px 36px;
        border: 1.25px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
      }

      .check-wrap {
        display: grid;
        width: 126px;
        height: 126px;
        place-items: center;
        border-radius: 50%;
        background: rgba(31, 78, 55, 0.44);
      }

      .check-circle {
        display: grid;
        width: 88px;
        height: 88px;
        place-items: center;
        border-radius: 50%;
        background: #39aa12;
      }

      .check-circle::before {
        width: 40px;
        height: 22px;
        border-left: 6px solid #fff;
        border-bottom: 6px solid #fff;
        transform: rotate(-45deg) translate(5px, -3px);
        content: "";
      }

      .success-copy h1 {
        margin: 0 0 12px;
        font-size: clamp(22px, 2.25vw, 30px);
        line-height: 1.05;
        font-weight: 900;
      }

      .success-copy p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: clamp(13px, 1.12vw, 16px);
        line-height: 1.3;
        font-weight: 400;
      }

      .success-copy strong {
        color: #fff;
        font-weight: 900;
      }

      .back-button {
        display: inline-flex;
        min-width: 250px;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        gap: 12px;
        border: 1.25px solid var(--border);
        border-radius: 12px;
        color: #fff;
        font-size: 18px;
        font-weight: 900;
        text-decoration: none;
      }

      .back-button span {
        color: var(--red);
        font-size: 24px;
        line-height: 1;
      }

      .site-footer {
        position: relative;
        z-index: 2;
        padding: 28px 20px;
        background: var(--surface);
        color: rgba(255, 255, 255, 0.55);
        text-align: center;
        font-size: 13px;
      }

      @media (max-width: 860px) {
        .content { width: min(100% - 32px, 720px); padding-top: 44px; }
        .progress-wrap { width: 100%; margin-bottom: 34px; }
        .success-card { grid-template-columns: 1fr; justify-items: center; padding: 30px 22px; text-align: center; }
        .back-button { min-width: 0; width: 100%; font-size: 22px; }
      }
    </style>
  </head>
  <body>
    <main class="confirmation-page">
      <div id="site-menu" data-active="vagas" data-auth="true"></div>
      <section class="content">
        <div class="progress-wrap" aria-label="Etapa da candidatura">
          <p class="progress-label">Etapa 2 de 2</p>
          <div class="progress"><span></span></div>
        </div>

        <section class="success-card" aria-label="Confirmação de candidatura enviada">
          <div class="check-wrap" aria-hidden="true"><span class="check-circle"></span></div>
          <div class="success-copy">
            <h1>Candidatura enviada com sucesso!</h1>
            <p>Sua candidatura foi enviada para vaga de <strong>Estágio em Design de UI/UX</strong></p>
            <a class="back-button" href="vagas.html"><span>←</span> Voltar para vagas</a>
          </div>
        </section>
      </section>
    </main>
    <footer class="site-footer"><span>&copy; Conecta Carreiras 2026. Todos os Direitos Reservados.</span><a href="politica-privacidade.html">Política de Privacidade</a></footer>
    <script src="menu.js"></script>
  </body>
</html>
