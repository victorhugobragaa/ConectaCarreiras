<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conecta Carreiras | Login Aluno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="background.css">
  <style>
    :root {
      --background: #071425;
      --surface: #111b2b;
      --border: rgba(255, 255, 255, 0.72);
      --muted: rgba(255, 255, 255, 0.58);
      --field: #071425;
      --gradient: linear-gradient(100.5deg, #00346f 0%, #93000e 100%);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--background);
      color: #fff;
      font-family: "Inter", Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: clamp(14px, 2.6vh, 32px) clamp(18px, 5vw, 96px);
      background: transparent;
    }

    .login-shell {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: min(900px, calc(100vw - 96px));
      height: min(660px, calc(100vh - 44px));
      min-height: 540px;
      overflow: hidden;
      border: 2px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
    }

    .visual-panel {
      position: relative;
      min-width: 0;
      overflow: hidden;
      border-right: 2px solid var(--border);
      background:
        linear-gradient(rgba(7, 20, 37, 0.34), rgba(7, 20, 37, 0.66)),
        url("IMAGENS/FUNDO%20LOGIN.png") center / cover no-repeat,
        #071425;
    }

    .visual-panel::after {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(rgba(7, 20, 37, 0.2), rgba(7, 20, 37, 0.66));
      content: "";
    }

    .visual-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.94;
      filter: saturate(0.95) contrast(1.06);
    }

    .brand {
      position: absolute;
      z-index: 2;
      left: clamp(10px, 1.1vw, 16px);
      top: clamp(10px, 1.2vh, 14px);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-mark {
      width: clamp(38px, 2.9vw, 50px);
      height: clamp(32px, 2.5vw, 42px);
      color: transparent;
    }

    .brand-logo {
      width: clamp(132px, 11vw, 176px);
      max-height: clamp(42px, 4.2vw, 58px);
      object-fit: contain;
      object-position: left center;
      display: block;
    }

    .brand-text strong {
      display: block;
      background: linear-gradient(97deg, #00346f 0%, #d11217 95%);
      background-clip: text;
      color: transparent;
      font-size: clamp(24px, 2.1vw, 34px);
      font-weight: 900;
      line-height: 0.88;
    }

    .brand-text small {
      display: block;
      color: #2a62b1;
      font-size: clamp(10px, 0.82vw, 13px);
      font-weight: 500;
      letter-spacing: 0;
      line-height: 1;
    }

    .visual-copy {
      position: absolute;
      z-index: 2;
      left: clamp(12px, 1.3vw, 18px);
      bottom: clamp(8px, 1.4vh, 14px);
      max-width: 360px;
      color: rgba(255, 255, 255, 0.72);
      font-size: clamp(13px, 1.05vw, 17px);
      font-weight: 300;
      line-height: 1.18;
    }

    .visual-copy strong {
      display: block;
      margin-top: 6px;
      color: #fff;
      font-size: clamp(16px, 1.25vw, 21px);
      font-weight: 700;
    }

    .form-panel {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-width: 0;
      padding: clamp(82px, 12vh, 124px) clamp(24px, 3vw, 44px) 32px;
    }

    .login-form {
      width: min(340px, 100%);
      transform: none;
    }

    .login-form h1 {
      margin: 0;
      max-width: 300px;
      font-size: clamp(23px, 1.85vw, 28px);
      font-weight: 800;
      line-height: 1.08;
    }

    .login-form .subtitle {
      margin: 2px 0 28px;
      color: var(--muted);
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 300;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 34px;
      margin-bottom: 40px;
      padding: 4px;
      border: 2px solid var(--border);
      border-radius: 10px;
    }

    .segmented button {
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #fff;
      font-family: inherit;
      font-size: clamp(14px, 1.05vw, 17px);
      font-weight: 400;
      line-height: 1;
      cursor: pointer;
    }

    .segmented .active {
      background: #253142;
    }

    .microsoft-button,
    .submit-button {
      width: 100%;
      border: 0;
      background: var(--gradient);
      color: #fff;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .microsoft-button {
      display: flex;
      height: 40px;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
      border-radius: 10px;
      font-size: clamp(13px, 1.02vw, 16px);
    }

    .ms-logo {
      display: grid;
      grid-template-columns: repeat(2, 10px);
      grid-template-rows: repeat(2, 10px);
      gap: 2px;
    }

    .ms-logo span:nth-child(1) {
      background: #f25022;
    }

    .ms-logo span:nth-child(2) {
      background: #7fba00;
    }

    .ms-logo span:nth-child(3) {
      background: #00a4ef;
    }

    .ms-logo span:nth-child(4) {
      background: #ffb900;
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      color: #fff;
      font-size: clamp(14px, 1.1vw, 18px);
    }

    .divider::before,
    .divider::after {
      display: block;
      height: 2px;
      background: var(--border);
      content: "";
    }

    .field {
      position: relative;
      display: block;
      width: 100%;
      margin-bottom: 12px;
    }

    .field svg {
      position: absolute;
      left: 15px;
      top: 50%;
      width: 22px;
      height: 22px;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.58);
    }

    .field svg[hidden],
    .field svg.is-hidden {
      display: none !important;
    }

    .field input {
      display: block;
      width: 100%;
      height: 40px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--field);
      color: #fff;
      font: inherit;
      font-size: clamp(15px, 1.15vw, 19px);
      outline: none;
      padding: 0 18px 0 46px;
    }

    .field input::placeholder {
      color: rgba(255, 255, 255, 0.55);
    }

    .submit-button {
      display: block;
      width: 200px;
      height: 42px;
      margin: 34px auto 0;
      border-radius: 16px;
      font-size: clamp(19px, 1.42vw, 24px);
    }

    @media (max-width: 980px) {
      .page {
        align-items: start;
        min-height: 100vh;
        padding: 24px;
      }

      .login-shell {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 0;
      }

      .visual-panel {
        min-height: 360px;
        border-right: 0;
        border-bottom: 2px solid var(--border);
      }

      .form-panel {
        padding: 34px 24px 44px;
      }

      .login-form {
        transform: none;
      }

      .login-form .subtitle,
      .segmented {
        margin-bottom: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="login-shell" aria-label="Login aluno Conecta Carreiras">
      <div class="visual-panel">
        <img class="visual-bg" src="IMAGENS/FUNDO%20LOGIN.png" alt="">

        <a href="index.html" class="brand" aria-label="Voltar para a pÃ¡gina inicial"><img class="brand-logo" src="IMAGENS/LOGO.png" alt="Conecta Carreiras"></a>

        <p class="visual-copy">
          Onde o seu talento encontra as melhores oportunidades do mercado tech
          <strong>-Conecta Carreiras</strong>
        </p>
      </div>

      <div class="form-panel">
        <form class="login-form">
          <h1>Bem vindo de volta</h1>
          <p class="subtitle">Acesse o painel de carreira e continue evoluindo</p>

          <div class="segmented" role="tablist" aria-label="Tipo de acesso">
            <button class="active" type="button" role="tab" aria-selected="true" data-login-mode="aluno">Aluno</button>
            <button type="button" role="tab" aria-selected="false" data-login-mode="recrutador">Recrutador</button>
          </div>

          <button class="microsoft-button" type="button" id="microsoft-login">
            <span class="ms-logo" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
            Entrar com a microsoft
          </button>

          <div class="divider">Ou</div>

          <label class="field">
            <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
              <circle cx="16" cy="10" r="4" stroke="currentColor" stroke-width="2.6"/>
              <path d="M6 26c.9-5.5 5.3-8.5 10-8.5s9.1 3 10 8.5" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
              <path d="M7.5 26h17" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
            </svg>
            <input type="email" name="email" placeholder="e-mail" autocomplete="email" required>
          </label>

          <label class="field">
            <svg class="birthdate-icon" viewBox="0 0 32 32" fill="none" aria-hidden="true">
              <rect x="5" y="7" width="22" height="22" rx="4" stroke="currentColor" stroke-width="2.4"/>
              <path d="M10 4v6M22 4v6M5 13h22" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <path d="M11 18h2M16 18h2M21 18h2M11 23h2M16 23h2M21 23h2" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            </svg>
            <svg class="password-icon is-hidden" viewBox="0 0 32 32" fill="none" aria-hidden="true">
              <rect x="6" y="14" width="20" height="14" rx="3" stroke="currentColor" stroke-width="2.4"/>
              <path d="M10 14v-3a6 6 0 0 1 12 0v3" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <path d="M16 20v4" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
            </svg>
            <input
              type="text"
              id="second-field"
              name="birthdate"
              placeholder="data de nascimento"
              autocomplete="bday"
              inputmode="numeric"
              maxlength="10"
              pattern="^(0[1-9]|[12][0-9]|3[01])\/(0[1-9]|1[0-2])\/\d{4}$"
              title="Digite a data no formato 01/01/2001"
              required
            >
          </label>

          <button class="submit-button" type="submit">Entrar</button>
        </form>
      </div>
    </section>
  </main>
  <script>
    const birthdateInput = document.querySelector('input[name="birthdate"]');
    const modeButtons = document.querySelectorAll("[data-login-mode]");
    const secondField = document.getElementById("second-field");
    const birthdateIcon = document.querySelector(".birthdate-icon");
    const passwordIcon = document.querySelector(".password-icon");
    const loginForm = document.querySelector(".login-form");
    const microsoftLogin = document.getElementById("microsoft-login");
    let currentMode = "aluno";

    function goToAlunoCadastro() {
      window.location.href = "cadastro.html";
    }

    birthdateInput.addEventListener("input", () => {
      if (secondField.dataset.mode === "recrutador") return;

      const numbers = birthdateInput.value.replace(/\D/g, "").slice(0, 8);
      const day = numbers.slice(0, 2);
      const month = numbers.slice(2, 4);
      const year = numbers.slice(4, 8);

      birthdateInput.value = [day, month, year].filter(Boolean).join("/");
    });

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const mode = button.dataset.loginMode;
        currentMode = mode;

        modeButtons.forEach((item) => {
          const isActive = item === button;
          item.classList.toggle("active", isActive);
          item.setAttribute("aria-selected", String(isActive));
        });

        if (mode === "recrutador") {
          secondField.dataset.mode = "recrutador";
          secondField.type = "password";
          secondField.name = "password";
          secondField.placeholder = "senha";
          secondField.autocomplete = "current-password";
          secondField.removeAttribute("maxlength");
          secondField.removeAttribute("pattern");
          secondField.removeAttribute("title");
          secondField.value = "";
          birthdateIcon.classList.add("is-hidden");
          passwordIcon.classList.remove("is-hidden");
          return;
        }

        secondField.dataset.mode = "aluno";
        secondField.type = "text";
        secondField.name = "birthdate";
        secondField.placeholder = "data de nascimento";
        secondField.autocomplete = "bday";
        secondField.maxLength = 10;
        secondField.pattern = "^(0[1-9]|[12][0-9]|3[01])\\/(0[1-9]|1[0-2])\\/\\d{4}$";
        secondField.title = "Digite a data no formato 01/01/2001";
        secondField.value = "";
        birthdateIcon.classList.remove("is-hidden");
        passwordIcon.classList.add("is-hidden");
      });
    });

    microsoftLogin.addEventListener("click", () => {
      if (currentMode === "aluno") {
        goToAlunoCadastro();
      }
    });

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();

      if (currentMode === "aluno") {
        goToAlunoCadastro();
      }
    });
  </script>
</body>
</html>
