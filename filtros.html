<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conecta Carreiras | Filtros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="menu.css" />
    <style>
      :root {
        --bg: #071425;
        --surface: #101b2c;
        --panel: rgba(16, 27, 44, 0.72);
        --border: rgba(255, 255, 255, 0.52);
        --muted: rgba(255, 255, 255, 0.62);
        --red: #d11217;
        --blue: #008be8;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: #fff;
        font-family: "Inter", Arial, sans-serif;
      }

      body::before {
        position: fixed;
        left: -260px;
        top: -260px;
        z-index: 1;
        width: clamp(620px, 48vw, 860px);
        height: clamp(680px, 82vh, 960px);
        pointer-events: none;
        background:
          radial-gradient(ellipse at 0% 0%, rgba(0, 119, 255, 0.34) 0%, rgba(0, 88, 190, 0.2) 34%, rgba(0, 52, 111, 0.08) 58%, transparent 76%),
          linear-gradient(135deg, rgba(0, 119, 255, 0.14) 0%, rgba(0, 52, 111, 0.08) 44%, transparent 72%);
        filter: blur(70px);
        content: "";
      }

      .filters-page {
        position: relative;
        z-index: 2;
        min-height: 100vh;
      }

      .filters-page .site-menu__item {
        position: relative;
      }

      .filters-page .site-menu__item.is-active {
        color: var(--red);
      }

      .filters-page .site-menu__item.is-active::after {
        position: absolute;
        left: 0;
        right: 0;
        bottom: -13px;
        height: 2px;
        background: rgba(255, 255, 255, 0.62);
        content: "";
      }

      .content {
        padding: 24px 36px 64px;
      }

      .filter-panel {
        min-height: 420px;
        border: 2px solid var(--blue);
        border-radius: 10px;
        background: rgba(7, 20, 37, 0.55);
        overflow: hidden;
      }

      .filter-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 70px;
        border-bottom: 1px solid var(--border);
        padding: 0 18px;
      }

      .filter-head h1 {
        margin: 0;
        font-size: 27px;
        font-weight: 800;
      }

      .close-link {
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
      }

      .filter-body {
        display: grid;
        gap: 20px;
        padding: 16px 18px 24px;
      }

      .filter-group h2 {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 9px;
        color: rgba(255, 255, 255, 0.76);
        font-size: 15px;
        font-weight: 800;
      }

      .filter-group svg {
        width: 18px;
        height: 18px;
        color: rgba(255, 255, 255, 0.64);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        max-width: 820px;
      }

      .chip {
        border: 1px solid var(--border);
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        line-height: 1;
        padding: 4px 8px;
        cursor: pointer;
      }

      .chip.is-selected {
        border-color: var(--red);
        background: rgba(209, 18, 23, 0.2);
        color: #fff;
      }

      .salary {
        width: min(760px, 100%);
      }

      .salary-line {
        position: relative;
        height: 22px;
        margin-top: 5px;
      }

      .salary-track {
        position: absolute;
        left: 0;
        right: 0;
        top: 10px;
        height: 3px;
        background: #fff;
      }

      .salary-fill {
        position: absolute;
        top: 10px;
        height: 3px;
        background: var(--red);
      }

      .salary-range {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        width: 100%;
        height: 22px;
        margin: 0;
        background: transparent;
        pointer-events: none;
        appearance: none;
        -webkit-appearance: none;
      }

      .salary-range::-webkit-slider-thumb {
        width: 18px;
        height: 18px;
        border: 0;
        border-radius: 50%;
        background: var(--red);
        cursor: pointer;
        pointer-events: auto;
        appearance: none;
        -webkit-appearance: none;
      }

      .salary-range::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border: 0;
        border-radius: 50%;
        background: var(--red);
        cursor: pointer;
        pointer-events: auto;
      }

      .salary-values {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 11px;
      }

      .checks {
        display: grid;
        gap: 7px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        cursor: pointer;
        padding: 0;
      }

      .check::before {
        width: 14px;
        height: 14px;
        border: 1.25px solid var(--border);
        border-radius: 50%;
        content: "";
      }

      .check.is-selected {
        color: #fff;
      }

      .check.is-selected::before {
        border-color: var(--red);
        background: var(--red);
        box-shadow: inset 0 0 0 3px var(--bg);
      }

    </style>
  </head>
  <body>
    <main class="filters-page">
      <div id="site-menu" data-active="vagas" data-auth="true"></div>
      <section class="content">
        <article class="filter-panel">
          <header class="filter-head">
            <h1>Filtros</h1>
            <a class="close-link" href="vagas.html">Fechar</a>
          </header>
          <div class="filter-body">
            <section class="filter-group">
              <h2><svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16v10H4z" stroke="currentColor" stroke-width="2"/><path d="M9 20h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Modalidade</h2>
              <div class="chips single-choice"><button class="chip" type="button">Remoto</button><button class="chip" type="button">H&iacute;brido</button><button class="chip" type="button">Presencial</button></div>
            </section>
            <section class="filter-group">
              <h2><svg viewBox="0 0 24 24" fill="none"><path d="M9 7V6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="4" y="7" width="16" height="13" rx="2" stroke="currentColor" stroke-width="2"/></svg>&Aacute;rea</h2>
              <div class="chips single-choice"><button class="chip" type="button">Social M&iacute;dia</button><button class="chip" type="button">Marketing Digital</button><button class="chip" type="button">Design Gr&aacute;fico</button><button class="chip" type="button">Publicidade</button><button class="chip" type="button">Comunica&ccedil;&atilde;o</button><button class="chip" type="button">UI/UX Design</button><button class="chip" type="button">Produ&ccedil;&atilde;o de Conte&uacute;do</button><button class="chip" type="button">Branding</button></div>
            </section>
            <section class="filter-group salary">
              <h2><svg viewBox="0 0 24 24" fill="none"><path d="M12 3v18M16 7.5c-.8-1-2-1.5-3.7-1.5-2 0-3.3.9-3.3 2.4 0 4 7.2 1.9 7.2 6 0 1.6-1.4 2.6-3.8 2.6-1.8 0-3.1-.5-4.1-1.6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Faixa Salarial</h2>
              <div class="salary-line">
                <span class="salary-track"></span>
                <span class="salary-fill"></span>
                <input class="salary-range salary-min" type="range" min="0" max="2500" step="50" value="1000" aria-label="Salário mínimo">
                <input class="salary-range salary-max" type="range" min="0" max="2500" step="50" value="2000" aria-label="Salário máximo">
              </div>
              <div class="salary-values"><span class="salary-min-value">R$1.000</span><span class="salary-max-value">R$2.000</span></div>
            </section>
            <section class="filter-group">
              <h2><svg viewBox="0 0 24 24" fill="none"><path d="M12 3.5l2.6 5.3 5.8.8-4.2 4.1 1 5.8L12 16.8 6.8 19.5l1-5.8-4.2-4.1 5.8-.8L12 3.5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>Especiais</h2>
              <div class="checks"><button class="check" type="button">Empresas Confi&aacute;veis</button><button class="check" type="button">Pr&oacute;ximas da FMU</button><button class="check" type="button">Com feedback</button></div>
            </section>
          </div>
        </article>
      </section>
    </main>
    <script src="menu.js"></script>
    <script>
      document.querySelectorAll(".single-choice").forEach((group) => {
        group.querySelectorAll(".chip").forEach((chip) => {
          chip.addEventListener("click", () => {
            group.querySelectorAll(".chip").forEach((item) => item.classList.remove("is-selected"));
            chip.classList.add("is-selected");
          });
        });
      });

      document.querySelectorAll(".check").forEach((check) => {
        check.addEventListener("click", () => check.classList.toggle("is-selected"));
      });

      const minRange = document.querySelector(".salary-min");
      const maxRange = document.querySelector(".salary-max");
      const minValue = document.querySelector(".salary-min-value");
      const maxValue = document.querySelector(".salary-max-value");
      const fill = document.querySelector(".salary-fill");

      function formatMoney(value) {
        return `R$${Number(value).toLocaleString("pt-BR")}`;
      }

      function updateSalary() {
        let min = Number(minRange.value);
        let max = Number(maxRange.value);
        if (min > max) {
          [min, max] = [max, min];
        }
        minValue.textContent = formatMoney(min);
        maxValue.textContent = formatMoney(max);
        fill.style.left = `${(min / 2500) * 100}%`;
        fill.style.right = `${100 - (max / 2500) * 100}%`;
      }

      minRange?.addEventListener("input", updateSalary);
      maxRange?.addEventListener("input", updateSalary);
      updateSalary();
    </script>
  </body>
</html>
