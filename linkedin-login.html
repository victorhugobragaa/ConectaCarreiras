<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="IMAGENS/Faicon.png" />
<title>Conecta Carreiras | LinkedIn Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="background.css" />
    <style>
      :root {
        --background: #071425;
        --surface: #111b2b;
        --border: rgba(255, 255, 255, 0.72);
        --muted: rgba(255, 255, 255, 0.5);
        --blue: #1973c9;
        --field: #071425;
        --red: #d11217;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: var(--background);
        color: #fff;
        font-family: "Inter", Arial, sans-serif;
      }

    .page {
      display: grid;
      height: 100vh;
      min-height: 100vh;
      place-items: start center;
      padding: clamp(14px, 3vh, 44px) 24px 18px;
      background: transparent;
      overflow: hidden;
    }

      .wrap {
        width: min(430px, 100%);
      }

      .step-label {
        margin: 0 0 4px;
        color: var(--red);
        font-size: 15px;
        font-weight: 700;
      }

      .progress {
        height: 4px;
        margin-bottom: 18px;
        background: var(--red);
      }

      .card {
        height: calc(100vh - clamp(72px, 11vh, 114px));
        min-height: 0;
        border: 1.5px solid var(--border);
        border-radius: 24px;
        background: var(--surface);
        padding: clamp(18px, 3vh, 24px) 28px clamp(20px, 3vh, 26px);
        overflow: hidden;
      }

      .linkedin-logo {
        display: block;
        width: clamp(190px, 27vh, 224px);
        height: auto;
        margin-bottom: clamp(38px, 7.6vh, 56px);
      }

      .form {
        width: min(360px, 100%);
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(28px, 4vh, 32px);
        font-weight: 800;
        line-height: 1.08;
      }

      .field {
        position: relative;
        display: block;
        margin-bottom: clamp(14px, 2.8vh, 20px);
      }

      .field svg {
        position: absolute;
        left: 16px;
        top: 50%;
        width: clamp(20px, 2.8vh, 24px);
        height: clamp(20px, 2.8vh, 24px);
        transform: translateY(-50%);
        color: var(--muted);
      }

      .field input {
        width: 100%;
        height: clamp(40px, 5.4vh, 48px);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        background: var(--field);
        color: rgba(255, 255, 255, 0.58);
        font: inherit;
        font-size: clamp(13px, 2vh, 15px);
        font-weight: 600;
        outline: none;
        padding: 0 16px 0 50px;
      }

      .field input::placeholder {
        color: var(--muted);
      }

      .login-button {
        display: grid;
        width: 100%;
        height: clamp(40px, 5.4vh, 48px);
        margin-top: 6px;
        place-items: center;
        border: 0;
        border-radius: 12px;
        background: var(--blue);
        color: #fff;
        font: inherit;
        font-size: clamp(14px, 2.2vh, 16px);
        font-weight: 800;
        cursor: pointer;
      }

      .divider {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: clamp(20px, 4vh, 34px);
        margin: clamp(22px, 4.4vh, 30px) 54px clamp(18px, 3.4vh, 24px);
        color: #fff;
        font-size: clamp(18px, 2.6vh, 22px);
        font-weight: 400;
      }

      .divider::before,
      .divider::after {
        height: 2px;
        background: var(--border);
        content: "";
      }

      .google-button {
        display: flex;
        width: 100%;
        height: clamp(40px, 5.4vh, 48px);
        align-items: center;
        justify-content: center;
        gap: 14px;
        border: 0;
        border-radius: 12px;
        background: #fff;
        color: #000;
        font: inherit;
        font-size: clamp(14px, 2.2vh, 16px);
        font-weight: 800;
        cursor: pointer;
      }

      .google-mark {
        width: clamp(24px, 3.4vh, 30px);
        height: clamp(24px, 3.4vh, 30px);
        object-fit: contain;
      }

      @media (max-height: 760px) {
        .page {
          padding: clamp(14px, 3vh, 44px) 24px 18px;
        }

        .card {
          height: calc(100vh - clamp(72px, 11vh, 114px));
          min-height: 0;
          padding: clamp(18px, 3vh, 24px) 28px clamp(20px, 3vh, 26px);
        }

        .linkedin-logo {
          width: clamp(190px, 27vh, 224px);
          margin-bottom: clamp(38px, 7.6vh, 56px);
        }

        h1 {
          margin-bottom: 16px;
        }

        .field {
          margin-bottom: 18px;
        }

        .field input {
          height: clamp(40px, 5.4vh, 48px);
        }

        .login-button {
          height: clamp(40px, 5.4vh, 48px);
          font-size: 22px;
        }

        .google-button {
          height: clamp(40px, 5.4vh, 48px);
          font-size: 16px;
        }

        .divider {
          margin: clamp(22px, 4.4vh, 30px) 54px clamp(18px, 3.4vh, 24px);
          font-size: clamp(18px, 2.6vh, 22px);
        }

        .google-mark {
          width: clamp(24px, 3.4vh, 30px);
          height: clamp(24px, 3.4vh, 30px);
        }
      }
      .site-footer {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
        padding: 22px 20px;
        background: #101b2c;
        color: rgba(255, 255, 255, 0.55);
        text-align: center;
        font-size: 13px;
      }

      .site-footer a {
        color: rgba(255, 255, 255, 0.74);
        font-weight: 700;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="wrap">
        <p class="step-label">Passo 2 de 2</p>
        <div class="progress" aria-hidden="true"></div>

        <section class="card" aria-label="Login LinkedIn">
          <img
            class="linkedin-logo"
            src="IMAGENS/logos_linkedin.png"
            alt="LinkedIn"
          />

        <form class="form" action="questionario-perfil.html?origem=linkedin">
            <h1>Login</h1>

            <label class="field">
              <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
                <circle
                  cx="16"
                  cy="10"
                  r="4"
                  stroke="currentColor"
                  stroke-width="2.6"
                />
                <path
                  d="M6 26c.9-5.5 5.3-8.5 10-8.5s9.1 3 10 8.5"
                  stroke="currentColor"
                  stroke-width="2.6"
                  stroke-linecap="round"
                />
                <path
                  d="M7.5 26h17"
                  stroke="currentColor"
                  stroke-width="2.6"
                  stroke-linecap="round"
                />
              </svg>
              <input type="email" placeholder="E-mail" required />
            </label>

            <label class="field">
              <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
                <rect
                  x="6"
                  y="14"
                  width="20"
                  height="14"
                  rx="3"
                  stroke="currentColor"
                  stroke-width="2.4"
                />
                <path
                  d="M10 14v-3a6 6 0 0 1 12 0v3"
                  stroke="currentColor"
                  stroke-width="2.4"
                  stroke-linecap="round"
                />
                <path
                  d="M16 20v4"
                  stroke="currentColor"
                  stroke-width="2.4"
                  stroke-linecap="round"
                />
              </svg>
              <input type="password" placeholder="Senha" required />
            </label>

            <button class="login-button" type="submit">Fazer login</button>

            <div class="divider">Ou</div>

          <button class="google-button" type="button" onclick="window.location.href='questionario-perfil.html?origem=linkedin'">
              <img
                class="google-mark"
                src="IMAGENS/devicon_google.png"
                alt=""
              />
              Fazer login com Google
            </button>
          </form>
        </section>
      </div>
    </main>
    <footer class="site-footer"><span>&copy; Conecta Carreiras 2026. Todos os Direitos Reservados.</span><a href="politica-privacidade.html">Política de Privacidade</a></footer>
  </body>
</html>
